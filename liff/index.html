<html lang="th">

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      background: #F0F4F8; min-height: 100vh; color: #1A202C;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1565C0 0%, #0D47A1 100%);
      padding: 20px 20px 28px; color: white;
    }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header p  { font-size: 13px; opacity: .8; margin-top: 4px; }

    /* ── Card ── */
    .card {
      background: white; border-radius: 16px; padding: 20px;
      margin: -12px 16px 16px; box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    label {
      font-size: 12px; font-weight: 600; color: #718096;
      text-transform: uppercase; letter-spacing: .5px;
      display: block; margin-bottom: 6px;
    }

    /* ── Input ── */
    .input-wrap {
      position: relative; display: flex; align-items: center;
      border: 1.5px solid #E2E8F0; border-radius: 10px;
      padding: 10px 12px; margin-bottom: 14px; transition: border-color .2s;
    }
    .input-wrap:focus-within { border-color: #1565C0; }
    .input-wrap .icon { font-size: 18px; margin-right: 8px; flex-shrink: 0; }
    .input-wrap input {
      border: none; outline: none; flex: 1; min-width: 0;
      font-size: 15px; color: #1A202C; background: transparent;
    }
    .input-wrap input::placeholder { color: #A0AEC0; }

    /* spinner */
    .ac-loading { display:none; width:16px; height:16px; flex-shrink:0; margin-left:4px; }
    .ac-loading::after {
      content:''; display:block; width:14px; height:14px;
      border:2px solid #E2E8F0; border-top-color:#1565C0;
      border-radius:50%; animation:spin .7s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* icon buttons */
    .icon-btn {
      background:none; border:none; cursor:pointer; padding:0 0 0 6px;
      font-size:17px; flex-shrink:0; opacity:.55; transition:opacity .15s; line-height:1;
    }
    .icon-btn:active { opacity:1; }
    .icon-btn.locating { animation:pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:.25} 50%{opacity:.9} }

    /* dropdown */
    .ac-dropdown {
      display:none; position:absolute; top:calc(100% + 2px); left:0; right:0;
      background:white; border:1.5px solid #E2E8F0; border-radius:10px;
      box-shadow:0 4px 20px rgba(0,0,0,.12); z-index:998;
      overflow:hidden; max-height:220px; overflow-y:auto;
    }
    .ac-item {
      padding:11px 14px; font-size:14px; cursor:pointer; color:#1A202C;
      line-height:1.4; border-top:1px solid #F7FAFC;
      display:flex; align-items:flex-start; gap:8px;
    }
    .ac-item:first-child { border-top:none; }
    .ac-item:hover { background:#EBF4FF; }
    .ac-item-icon { font-size:14px; margin-top:1px; flex-shrink:0; color:#A0AEC0; }
    .ac-item-main { font-weight:500; }
    .ac-item-sub  { font-size:12px; color:#718096; margin-top:1px; }

    /* time grid */
    .time-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:6px; }
    .time-btn {
      border:1.5px solid #E2E8F0; border-radius:10px; padding:10px;
      text-align:center; font-size:14px; font-weight:500;
      color:#4A5568; background:white; cursor:pointer; transition:all .15s;
    }
    .time-btn.active {
      border-color:#1565C0; background:#EBF4FF; color:#1565C0; font-weight:600;
    }
    .custom-time-wrap { display:none; margin-top:8px; }
    .custom-time-wrap.show { display:block; }
    .custom-time-wrap input[type="time"] {
      width:100%; border:1.5px solid #E2E8F0; border-radius:10px;
      padding:10px 12px; font-size:16px; outline:none;
    }
    .custom-time-wrap input[type="time"]:focus { border-color:#1565C0; }

    /* CTA */
    .btn-analyze {
      width:100%; background:linear-gradient(135deg,#1565C0,#1976D2);
      color:white; border:none; border-radius:12px; padding:16px;
      font-size:16px; font-weight:600; cursor:pointer;
      transition:opacity .2s; margin-top:4px;
    }
    .btn-analyze:active { opacity:.85; }
    .btn-analyze:disabled { opacity:.5; cursor:not-allowed; }

    /* loading */
    #loading { display:none; text-align:center; padding:40px 20px; }
    .spinner {
      width:40px; height:40px; border:4px solid #E2E8F0; border-top-color:#1565C0;
      border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px;
    }
    #loading p { color:#718096; font-size:14px; }

    /* error */
    #error-box {
      display:none; background:#FFF5F5; border:1.5px solid #FC8181;
      border-radius:10px; padding:14px; margin:16px; font-size:14px; color:#C53030;
    }

    /* ════════════ MAP MODAL ════════════ */
    #map-modal {
      display:none; position:fixed; inset:0; z-index:9999;
      background:white; flex-direction:column;
    }

    /* topbar */
    .map-topbar {
      display:flex; align-items:center; padding:12px 16px;
      background:#1565C0; color:white; gap:10px; flex-shrink:0;
    }
    .map-close-btn {
      background:rgba(255,255,255,.2); border:none; color:white;
      border-radius:8px; padding:7px 12px; font-size:14px; cursor:pointer; white-space:nowrap;
    }
    .map-topbar-title { flex:1; font-size:15px; font-weight:600; text-align:center; }
    .map-ok-btn {
      background:white; border:none; color:#1565C0; border-radius:8px;
      padding:7px 14px; font-size:14px; font-weight:700; cursor:pointer;
      transition:opacity .15s; white-space:nowrap;
    }
    .map-ok-btn:disabled { opacity:.35; cursor:not-allowed; }

    /* search area — PlaceAutocompleteElement lives here */
    .map-search-area {
      padding:10px 16px; background:#F7FAFC;
      border-bottom:1px solid #E2E8F0; flex-shrink:0;
      /* must NOT clip the places dropdown */
      overflow:visible; position:relative; z-index:100;
    }
    /* Nominatim search inside map modal */
    .map-search-input {
      width:100%; padding:10px 14px; font-size:15px;
      border:1.5px solid #E2E8F0; border-radius:10px; outline:none;

<!-- ─── Form ─── -->
<div id="view-form">
  <div class="header">

<script>
const LIFF_ID = '__LIFF_ID__';

let selectedTime     = 'now';
let lastResult       = null;
let mapInstance      = null;
let mapMarker        = null;
let mapTargetField   = '';
let mapSelectedAddr  = '';
let mapInitialised   = false;

// ── LIFF + auto GPS ──────────────────────────────
(async () => {
  try { await liff.init({ liffId: LIFF_ID }); } catch (e) { console.warn('LIFF:', e.message); }
  detectGPS('origin', true);
})();

// ── GPS ──────────────────────────────────────────
async function detectGPS(field, silent = false) {
  if (!navigator.geolocation) { if (!silent) showError('GPS ไม่รองรับ'); return; }
  const btn   = document.getElementById(`gps-${field}`);
  const input = document.getElementById(field);
  btn.classList.add('locating');
  input.placeholder = 'กำลังระบุตำแหน่ง...';
  navigator.geolocation.getCurrentPosition(
    async ({ coords: { latitude: lat, longitude: lon } }) => {
      try {
        const res  = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=th`
        );
        const data = await res.json();
        input.value = data.display_name || `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
      } catch { if (!silent) showError('แปลงพิกัดไม่ได้'); }
      finally { btn.classList.remove('locating'); input.placeholder = 'พิมพ์หรือเลือกจากแผนที่...'; }
    },
    (err) => {
      btn.classList.remove('locating'); input.placeholder = 'พิมพ์หรือเลือกจากแผนที่...';
      if (!silent) showError(err.code === 1 ? 'กรุณาอนุญาต GPS ในการตั้งค่าเบราว์เซอร์' : 'ระบุตำแหน่งไม่ได้');
    },
    { timeout: 10000, enableHighAccuracy: true }
  );
}

// ── Text-input autocomplete (backend proxy) ───────
function setupAutocomplete(inputId, dropdownId, loadingId) {
  const input    = document.getElementById(inputId);
  const dropdown = document.getElementById(dropdownId);
  const loadEl   = document.getElementById(loadingId);
  let timer = null, active = -1;

  input.addEventListener('input', () => {
    clearTimeout(timer); active = -1;
    const q = input.value.trim();
    if (q.length < 2) { hide(); return; }
    loadEl.style.display = 'block';
    timer = setTimeout(() => fetchSug(q), 350);
  });
  input.addEventListener('keydown', (e) => {
    const items = dropdown.querySelectorAll('.ac-item');
    if (!items.length) return;
    if (e.key==='ArrowDown')  { active=Math.min(active+1,items.length-1); hl(items); e.preventDefault(); }
    else if(e.key==='ArrowUp'){ active=Math.max(active-1,-1); hl(items); e.preventDefault(); }
    else if(e.key==='Enter'&&active>=0){ items[active].dispatchEvent(new Event('mousedown')); e.preventDefault(); }
    else if(e.key==='Escape') hide();
  });
  document.addEventListener('mousedown', (e) => {
    if (!input.contains(e.target) && !dropdown.contains(e.target)) hide();
  });

  async function fetchSug(q) {
    try {
      const res  = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&countrycodes=th&format=json&limit=5&accept-language=th`
      );
      const raw  = await res.json();
      loadEl.style.display = 'none';
      show(raw.map(d => ({ description: d.display_name })));
    } catch { loadEl.style.display='none'; hide(); }
  }
  function show(items) {
    if (!items?.length) { hide(); return; }
    dropdown.innerHTML = '';
    items.forEach(item => {
      const p = item.description.split(',');
      const d = document.createElement('div');
      d.className = 'ac-item';
      d.innerHTML = `<span class="ac-item-icon">📍</span><div>
        <div class="ac-item-main">${p[0]}</div>
        ${p.slice(1).join(',').trim() ? `<div class="ac-item-sub">${p.slice(1).join(',').trim()}</div>` : ''}
      </div>`;
      d.addEventListener('mousedown', (e) => { e.preventDefault(); input.value=item.description; hide(); });
      dropdown.appendChild(d);
    });
    dropdown.style.display = 'block'; active = -1;
  }
  function hl(items) {
    items.forEach((el,i) => el.style.background = i===active?'#EBF4FF':'');
    if (active>=0) items[active].scrollIntoView({block:'nearest'});
  }
  function hide() { dropdown.style.display='none'; dropdown.innerHTML=''; loadEl.style.display='none'; active=-1; }
}

setupAutocomplete('origin',      'dropdown-origin',      'loading-origin');
setupAutocomplete('destination', 'dropdown-destination', 'loading-destination');

// ── Map Modal ─────────────────────────────────────
async function openMapPicker(field) {
  mapTargetField  = field;
  mapSelectedAddr = '';
  document.getElementById('map-addr-preview').textContent = '📍 แตะบนแผนที่เพื่อเลือกตำแหน่ง';
  document.getElementById('map-ok-btn').disabled = true;
  document.getElementById('map-modal').style.display = 'flex';

  if (!mapInitialised) {
    try { await initMap(); }
    catch (e) { closeMapModal(); showError('โหลดแผนที่ไม่ได้: ' + e.message); }
  }
}

async function initMap() {
  const [{ Map }, { Marker }] = await Promise.all([
    google.maps.importLibrary('maps'),
    google.maps.importLibrary('marker'),
  ]);

  // Center on current GPS, fallback = Bangkok
  let center = { lat: 13.7563, lng: 100.5018 };
  try {
    center = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(
        ({ coords: c }) => res({ lat: c.latitude, lng: c.longitude }),
        rej, { timeout: 5000 }
      )
    );
  } catch { /* use Bangkok default */ }

  mapInstance = new Map(document.getElementById('gmap'), {
    center, zoom: 15,
    mapTypeControl: false, streetViewControl: false, fullscreenControl: false,
  });

  // ── Nominatim search for map modal ──
  const mapSearchInput = document.createElement('input');
  mapSearchInput.type = 'text';
  mapSearchInput.placeholder = '🔍 ค้นหาสถานที่ในไทย...';
  mapSearchInput.className = 'map-search-input';

  const mapSuggestBox = document.createElement('div');
  mapSuggestBox.className = 'map-suggest-box';

  const searchArea = document.getElementById('map-search-area');
  searchArea.appendChild(mapSearchInput);
  searchArea.appendChild(mapSuggestBox);

  let nomTimer;
  mapSearchInput.addEventListener('input', () => {
    clearTimeout(nomTimer);
    const q = mapSearchInput.value.trim();
    if (q.length < 2) { mapSuggestBox.style.display = 'none'; return; }
    nomTimer = setTimeout(async () => {
      try {
        const res   = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&countrycodes=th&format=json&limit=5&accept-language=th`);
        const items = await res.json();
        if (!items.length) { mapSuggestBox.style.display = 'none'; return; }
        mapSuggestBox.innerHTML = '';
        items.forEach(item => {
          const div = document.createElement('div');
          div.className = 'map-suggest-item';
          div.textContent = '📍 ' + item.display_name;
          div.addEventListener('click', () => {
            const lat = parseFloat(item.lat), lng = parseFloat(item.lon);
            mapInstance.panTo({ lat, lng });
            mapInstance.setZoom(16);
            dropPin({ lat, lng });
            mapSelectedAddr = item.display_name;
            document.getElementById('map-addr-preview').textContent = '📍 ' + item.display_name;
            document.getElementById('map-ok-btn').disabled = false;
            mapSuggestBox.style.display = 'none';
            mapSearchInput.value = '';
          });
          mapSuggestBox.appendChild(div);
        });
        mapSuggestBox.style.display = 'block';
      } catch { mapSuggestBox.style.display = 'none'; }
    }, 400);
  });
  document.addEventListener('click', (e) => {
    if (!searchArea.contains(e.target)) mapSuggestBox.style.display = 'none';
  });

  // ── Tap on map → drop pin + Nominatim reverse geocode ──
  mapInstance.addListener('click', async (e) => {
    const latLng = e.latLng;
    dropPin(latLng);
    document.getElementById('map-addr-preview').textContent = '⏳ กำลังหาที่อยู่...';
    document.getElementById('map-ok-btn').disabled = true;
    try {
      const res  = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${latLng.lat()}&lon=${latLng.lng()}&format=json&accept-language=th`
      );
      const data = await res.json();
      mapSelectedAddr = data.display_name || `${latLng.lat().toFixed(5)}, ${latLng.lng().toFixed(5)}`;
      document.getElementById('map-addr-preview').textContent = '📍 ' + mapSelectedAddr;
      document.getElementById('map-ok-btn').disabled = false;
    } catch {
      document.getElementById('map-addr-preview').textContent = '❌ ระบุที่อยู่ไม่ได้';
    }
  });

  window._GMMarker = Marker;
  mapInitialised = true;
}

function dropPin(position) {
  if (mapMarker) mapMarker.setMap(null);
  mapMarker = new window._GMMarker({ position, map: mapInstance, animation: google.maps.Animation.DROP });
}

function centerMapToMyLocation() {
  navigator.geolocation?.getCurrentPosition(
    ({ coords: c }) => { mapInstance?.panTo({ lat: c.latitude, lng: c.longitude }); mapInstance?.setZoom(16); },
    () => alert('ไม่สามารถระบุตำแหน่งได้')
  );
}

function confirmMapLocation() {
  if (mapSelectedAddr && mapTargetField) {
    document.getElementById(mapTargetField).value = mapSelectedAddr;
  }
  closeMapModal();
}

function closeMapModal() {
  document.getElementById('map-modal').style.display = 'none';
}

// ── Time Selector ─────────────────────────────────
function selectTime(btn) {
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); selectedTime = btn.dataset.val;
  const wrap = document.getElementById('custom-time-wrap');
  if (selectedTime === 'custom') {
    wrap.classList.add('show');
    const n = new Date();
    document.getElementById('custom-time').value =
      `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  } else { wrap.classList.remove('show'); }
}

function getDepartureISO() {
  const now = new Date();
  if (selectedTime==='now')    return now.toISOString();
  if (selectedTime==='+30')    return new Date(now.getTime()+30*60000).toISOString();
  if (selectedTime==='+60')    return new Date(now.getTime()+60*60000).toISOString();
  if (selectedTime==='custom') {
    const [h,m] = document.getElementById('custom-time').value.split(':').map(Number);
    const t = new Date(now); t.setHours(h,m,0,0);
    if (t<now) t.setDate(t.getDate()+1);
    return t.toISOString();
  }
  return now.toISOString();
}

// ── Analyze ───────────────────────────────────────
async function analyze() {
  const origin = document.getElementById('origin').value.trim();
  const dest   = document.getElementById('destination').value.trim();
  if (!origin||!dest) { showError('กรุณาใส่ต้นทางและปลายทางก่อน'); return; }
  hideError(); showLoading(true);
  try {
    let uid = null;
    try { uid = liff.isLoggedIn() ? liff.getDecodedIDToken()?.sub : null; } catch {}
    const res = await fetch('/api/route-weather', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ origin, destination:dest, departure_iso:getDepartureISO(), uid }),
    });
    if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.detail||`Error ${res.status}`); }
    lastResult = await res.json();
    showResult(lastResult);
  } catch (e) { showError(e.message||'เกิดข้อผิดพลาด'); }
  finally { showLoading(false); }
}

// ── Render Result ─────────────────────────────────
function showResult(d) {
  document.getElementById('view-form').style.display = 'none';
  document.getElementById('result').style.display = 'block';

  const hdr = document.getElementById('res-header');
  hdr.className = 'result-header ' + (
    d.risk_pct===0 ? 'safe' : d.max_intensity==='light' ? 'light' :
    d.max_intensity==='moderate' ? 'moderate' : 'heavy'
  );
  document.getElementById('res-emoji').textContent    = d.max_emoji;
  document.getElementById('res-headline').textContent = headlineText(d);
  document.getElementById('res-meta').textContent =
    `${d.origin} → ${d.destination}  ·  ออก ${d.departure_str}  ·  ${d.duration_min} นาที`;
  document.getElementById('res-risk').textContent   = d.risk_pct;
  document.getElementById('risk-fill').style.width  = d.risk_pct + '%';

  const rc = document.getElementById('rec-card');
  rc.className = 'rec-card ' + (d.risk_pct>=75?'danger':d.risk_pct>=40?'warning':'');
  document.getElementById('rec-text').textContent = d.recommendation;

  const alt = document.getElementById('alt-depart');
  if (d.best_alt_departure) {
    alt.style.display='flex';
    document.getElementById('alt-time').textContent = d.best_alt_departure;
  } else alt.style.display='none';

  const tl = document.getElementById('timeline'); tl.innerHTML='';
  d.waypoints.forEach(wp => {
    const li = document.createElement('li');
    li.innerHTML=`<div class="tl-time">${wp.eta_str}</div>
      <div class="tl-dot ${wp.intensity}">${wp.emoji}</div>
      <div class="tl-info">
        <div class="tl-name">${wp.name}</div>
        <div class="tl-desc">${wp.intensity_th}${wp.mm>0?' · '+wp.mm+' mm/hr':''}</div>
      </div>`;
    tl.appendChild(li);
  });
}

function headlineText(d) {
  if (d.risk_pct===0)               return 'ฟ้าใส ออกได้เลย ☀️';
  if (d.risk_pct<30)                return 'มีฝนเล็กน้อยบางช่วง';
  if (d.max_intensity==='light')    return 'ฝนเล็กน้อยบางจุด';
  if (d.max_intensity==='moderate') return 'ฝนปานกลาง ระวังด้วยนะ';
  return 'ฝนหนัก ควรเลื่อนเวลา';
}

// ── Send to LINE ──────────────────────────────────
async function sendToChat() {
  if (!lastResult) return;
  const d = lastResult;
  const rain = d.rain_waypoints.length>0
    ? d.rain_waypoints.map(w=>`• ${w.name}  ${w.emoji}  ${w.eta_str}`).join('\n')
    : '• ไม่พบฝนตลอดเส้นทาง ✅';
  const msg = [
    `🗺️ Rain Route — ${d.origin} → ${d.destination}`,
    `⏰ ออก ${d.departure_str}  |  🚗 ${d.duration_min} นาที`,
    `☔ ความเสี่ยงเจอฝน ${d.risk_pct}%`,
    '','📍 จุดที่มีฝน:',rain,'',
    `💡 ${d.recommendation}`,
    d.best_alt_departure?`⏰ แนะนำออก ${d.best_alt_departure} แทน`:'',
  ].filter(Boolean).join('\n').trim();
  try {
    if (liff.isInClient()) { await liff.sendMessages([{type:'text',text:msg}]); liff.closeWindow(); }
    else { await navigator.clipboard.writeText(msg); alert('คัดลอกแล้ว!'); }
  } catch (e) { alert('ส่งไม่ได้: '+e.message); }
}

// ── Helpers ───────────────────────────────────────
function showForm()   { document.getElementById('view-form').style.display='block'; document.getElementById('result').style.display='none'; hideError(); }
function showLoading(on) { document.getElementById('loading').style.display=on?'block':'none'; document.querySelector('.btn-analyze').disabled=on; }
function showError(msg)  { const e=document.getElementById('error-box'); e.textContent='❌ '+msg; e.style.display='block'; }
function hideError()     { document.getElementById('error-box').style.display='none'; }
</script>
