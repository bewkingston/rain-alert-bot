<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Rain Route 🌧️</title>

  <!-- Leaflet.js — OpenStreetMap (ฟรี ไม่มีลายน้ำ) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      background: #F0F4F8; min-height: 100vh; color: #1A202C;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1565C0 0%, #0D47A1 100%);
      padding: 20px 20px 28px; color: white;
    }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header p  { font-size: 13px; opacity: .8; margin-top: 4px; }

    /* ── Card ── */
    .card {
      background: white; border-radius: 16px; padding: 20px;
      margin: -12px 16px 16px; box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    label {
      font-size: 12px; font-weight: 600; color: #718096;
      text-transform: uppercase; letter-spacing: .5px;
      display: block; margin-bottom: 6px;
    }

    /* ── Input ── */
    .input-wrap {
      position: relative; display: flex; align-items: center;
      border: 1.5px solid #E2E8F0; border-radius: 10px;
      padding: 10px 12px; margin-bottom: 14px; transition: border-color .2s;
    }
    .input-wrap:focus-within { border-color: #1565C0; }
    .input-wrap .icon { font-size: 18px; margin-right: 8px; flex-shrink: 0; }
    .input-wrap input {
      border: none; outline: none; flex: 1; min-width: 0;
      font-size: 15px; color: #1A202C; background: transparent;
    }
    .input-wrap input::placeholder { color: #A0AEC0; }

    /* spinner */
    .ac-loading { display:none; width:16px; height:16px; flex-shrink:0; margin-left:4px; }
    .ac-loading::after {
      content:''; display:block; width:14px; height:14px;
      border:2px solid #E2E8F0; border-top-color:#1565C0;
      border-radius:50%; animation:spin .7s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* icon buttons */
    .icon-btn {
      background:none; border:none; cursor:pointer; padding:0 0 0 6px;
      font-size:17px; flex-shrink:0; opacity:.55; transition:opacity .15s; line-height:1;
    }
    .icon-btn:active { opacity:1; }
    .icon-btn.locating { animation:pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:.25} 50%{opacity:.9} }

    /* dropdown */
    .ac-dropdown {
      display:none; position:absolute; top:calc(100% + 2px); left:0; right:0;
      background:white; border:1.5px solid #E2E8F0; border-radius:10px;
      box-shadow:0 4px 20px rgba(0,0,0,.12); z-index:998;
      overflow:hidden; max-height:220px; overflow-y:auto;
    }
    .ac-item {
      padding:11px 14px; font-size:14px; cursor:pointer; color:#1A202C;
      line-height:1.4; border-top:1px solid #F7FAFC;
      display:flex; align-items:flex-start; gap:8px;
    }
    .ac-item:first-child { border-top:none; }
    .ac-item:hover { background:#EBF4FF; }
    .ac-item-icon { font-size:14px; margin-top:1px; flex-shrink:0; color:#A0AEC0; }
    .ac-item-main { font-weight:500; }
    .ac-item-sub  { font-size:12px; color:#718096; margin-top:1px; }

    /* time grid */
    .time-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:6px; }
    .time-btn {
      border:1.5px solid #E2E8F0; border-radius:10px; padding:10px;
      text-align:center; font-size:14px; font-weight:500;
      color:#4A5568; background:white; cursor:pointer; transition:all .15s;
    }
    .time-btn.active {
      border-color:#1565C0; background:#EBF4FF; color:#1565C0; font-weight:600;
    }
    .custom-time-wrap { display:none; margin-top:8px; }
    .custom-time-wrap.show { display:block; }
    .custom-time-wrap input[type="time"] {
      width:100%; border:1.5px solid #E2E8F0; border-radius:10px;
      padding:10px 12px; font-size:16px; outline:none;
    }
    .custom-time-wrap input[type="time"]:focus { border-color:#1565C0; }

    /* CTA */
    .btn-analyze {
      width:100%; background:linear-gradient(135deg,#1565C0,#1976D2);
      color:white; border:none; border-radius:12px; padding:16px;
      font-size:16px; font-weight:600; cursor:pointer;
      transition:opacity .2s; margin-top:4px;
    }
    .btn-analyze:active { opacity:.85; }
    .btn-analyze:disabled { opacity:.5; cursor:not-allowed; }

    /* loading */
    #loading { display:none; text-align:center; padding:40px 20px; }
    .spinner {
      width:40px; height:40px; border:4px solid #E2E8F0; border-top-color:#1565C0;
      border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px;
    }
    #loading p { color:#718096; font-size:14px; }

    /* error */
    #error-box {
      display:none; background:#FFF5F5; border:1.5px solid #FC8181;
      border-radius:10px; padding:14px; margin:16px; font-size:14px; color:#C53030;
    }

    /* ════════════ MAP MODAL ════════════ */
    #map-modal {
      display:none; position:fixed; inset:0; z-index:9999;
      background:white; flex-direction:column;
    }

    /* topbar */
    .map-topbar {
      display:flex; align-items:center; padding:12px 16px;
      background:#1565C0; color:white; gap:10px; flex-shrink:0;
    }
    .map-close-btn {
      background:rgba(255,255,255,.2); border:none; color:white;
      border-radius:8px; padding:7px 12px; font-size:14px; cursor:pointer; white-space:nowrap;
    }
    .map-topbar-title { flex:1; font-size:15px; font-weight:600; text-align:center; }
    .map-ok-btn {
      background:white; border:none; color:#1565C0; border-radius:8px;
      padding:7px 14px; font-size:14px; font-weight:700; cursor:pointer;
      transition:opacity .15s; white-space:nowrap;
    }
    .map-ok-btn:disabled { opacity:.35; cursor:not-allowed; }

    /* search area — PlaceAutocompleteElement lives here */
    .map-search-area {
      padding:10px 16px; background:#F7FAFC;
      border-bottom:1px solid #E2E8F0; flex-shrink:0;
      /* must NOT clip the places dropdown */
      overflow:visible; position:relative; z-index:100;
    }
    /* Nominatim search inside map modal */
    .map-search-input {
      width:100%; padding:10px 14px; font-size:15px;
      border:1.5px solid #E2E8F0; border-radius:10px; outline:none;
      color:#1A202C; background:white;
    }
    .map-search-input:focus { border-color:#1565C0; }
    .map-suggest-box {
      display:none; position:absolute; left:16px; right:16px; top:calc(100% - 10px);
      background:white; border:1.5px solid #E2E8F0; border-radius:10px;
      box-shadow:0 4px 20px rgba(0,0,0,.12); z-index:10000;
      overflow:hidden; max-height:250px; overflow-y:auto;
    }
    .map-suggest-item {
      padding:11px 14px; cursor:pointer; font-size:14px; color:#1A202C;
      border-bottom:1px solid #F7FAFC; line-height:1.4;
    }
    .map-suggest-item:hover { background:#EBF4FF; }

    /* map */
    #gmap { flex:1; width:100%; z-index:0; }
    /* ซ่อน Leaflet attribution ให้เล็กลง */
    .leaflet-control-attribution { font-size:9px !important; opacity:.6; }

    /* footer */
    .map-footer {
      padding:12px 16px; background:white;
      border-top:1px solid #E2E8F0; flex-shrink:0;
    }
    #map-addr-preview {
      font-size:13px; color:#4A5568; line-height:1.5; min-height:20px;
    }
    .map-my-loc-btn {
      margin-top:8px; background:none; border:1.5px solid #1565C0;
      color:#1565C0; border-radius:8px; padding:7px 14px;
      font-size:13px; font-weight:500; cursor:pointer;
    }
    .map-my-loc-btn:active { background:#EBF4FF; }

    /* ════════════ RESULT ════════════ */
    #result { display:none; padding:0 16px 24px; }

    .result-header { border-radius:16px; padding:20px; color:white; margin-bottom:12px; }
    .result-header.safe     { background:linear-gradient(135deg,#2E7D32,#388E3C); }
    .result-header.light    { background:linear-gradient(135deg,#1565C0,#1976D2); }
    .result-header.moderate { background:linear-gradient(135deg,#E65100,#F57C00); }
    .result-header.heavy    { background:linear-gradient(135deg,#B71C1C,#C62828); }

    .result-header .big-emoji { font-size:36px; margin-bottom:8px; }
    .result-header h2 { font-size:20px; font-weight:700; margin-bottom:4px; }
    .result-header .meta { font-size:12px; opacity:.8; }

    .risk-bar-wrap { margin:12px 0; }
    .risk-label { font-size:12px; opacity:.85; margin-bottom:6px; }
    .risk-bar { background:rgba(255,255,255,.25); border-radius:99px; height:8px; }
    .risk-fill { background:white; border-radius:99px; height:8px; transition:width .6s ease; }

    .section-title {
      font-size:13px; font-weight:600; color:#718096;
      text-transform:uppercase; letter-spacing:.5px; margin:16px 0 10px;
    }
    .timeline { list-style:none; }
    .timeline li {
      display:flex; align-items:flex-start; padding:10px 0;
      border-bottom:1px solid #F7FAFC;
    }
    .timeline li:last-child { border-bottom:none; }
    .tl-time { font-size:13px; color:#718096; width:46px; flex-shrink:0; padding-top:1px; }
    .tl-dot {
      width:28px; height:28px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:14px; flex-shrink:0; margin:0 10px;
    }
    .tl-dot.none     { background:#F0FFF4; }
    .tl-dot.light    { background:#EBF4FF; }
    .tl-dot.moderate { background:#FFFAF0; }
    .tl-dot.heavy    { background:#FFF5F5; }
    .tl-dot.violent  { background:#FAF5FF; }
    .tl-info { flex:1; }
    .tl-name { font-size:14px; font-weight:500; color:#1A202C; }
    .tl-desc { font-size:12px; color:#718096; margin-top:2px; }

    .rec-card {
      background:#EBF4FF; border-left:4px solid #1565C0;
      border-radius:0 10px 10px 0; padding:14px; margin:8px 0;
    }
    .rec-card.warning { background:#FFFAF0; border-color:#E65100; }
    .rec-card.danger  { background:#FFF5F5; border-color:#C62828; }
    .rec-card .rec-title { font-size:13px; font-weight:600; color:#1565C0; margin-bottom:4px; }
    .rec-card.warning .rec-title { color:#E65100; }
    .rec-card.danger  .rec-title { color:#C62828; }
    .rec-card .rec-text { font-size:14px; color:#1A202C; line-height:1.5; }

    .alt-depart {
      background:#F0FFF4; border-radius:10px; padding:14px; margin-top:10px;
      display:flex; align-items:center; gap:10px;
    }
    .alt-depart .alt-text { font-size:13px; color:#276749; }
    .alt-depart .alt-time { font-size:16px; font-weight:700; color:#276749; }

    .btn-send {
      width:100%; background:#06C755; color:white; border:none; border-radius:12px;
      padding:14px; font-size:15px; font-weight:600; cursor:pointer; margin-top:16px;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-send:active { opacity:.85; }
    .btn-back {
      width:100%; background:transparent; color:#718096;
      border:1.5px solid #E2E8F0; border-radius:12px;
      padding:12px; font-size:14px; cursor:pointer; margin-top:8px;
    }

    /* ════ Saved Places ════ */
    .saved-section { padding: 12px 16px 0; }
    .saved-label {
      font-size: 11px; font-weight: 600; color: #718096;
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px;
    }
    .saved-chips {
      display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px;
    }
    .saved-chips::-webkit-scrollbar { display: none; }
    .saved-chip {
      background: white; border: 1.5px solid #E2E8F0; border-radius: 20px;
      padding: 6px 14px; font-size: 13px; font-weight: 500;
      white-space: nowrap; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; gap: 6px; transition: all .15s;
      color: #1A202C;
    }
    .saved-chip:active { background: #EBF4FF; border-color: #1565C0; }

    /* Save bottom-sheet */
    .save-sheet {
      position: fixed; inset: 0; z-index: 99998;
      background: rgba(0,0,0,.45); display: flex; align-items: flex-end;
    }
    .save-sheet-inner {
      background: white; width: 100%; border-radius: 20px 20px 0 0;
      padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0px));
    }
    .save-sheet-title { font-size: 15px; font-weight: 600; color: #1A202C; margin-bottom: 14px; }
    .save-sheet-addr  { font-size: 13px; color: #718096; margin-bottom: 16px; line-height: 1.4; }
    .save-sheet-input {
      width: 100%; border: 1.5px solid #E2E8F0; border-radius: 10px;
      padding: 11px 14px; font-size: 15px; outline: none; color: #1A202C; margin-bottom: 12px;
    }
    .save-sheet-input:focus { border-color: #1565C0; }
    .save-sheet-actions { display: flex; gap: 8px; }
    .save-sheet-actions button {
      flex: 1; padding: 13px; border-radius: 10px; font-size: 14px;
      font-weight: 600; cursor: pointer; border: none;
    }
    .btn-save-ok  { background: #1565C0; color: white; }
    .btn-save-del { background: #FFF5F5; color: #C53030; }
    .btn-save-cancel { background: #F7FAFC; color: #718096; }

    /* Chip use-as sheet */
    .use-sheet { position: fixed; inset: 0; z-index: 99998; background: rgba(0,0,0,.45); display: flex; align-items: flex-end; }
    .use-sheet-inner { background: white; width: 100%; border-radius: 20px 20px 0 0; padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0px)); }
    .use-sheet-name { font-size: 16px; font-weight: 700; color: #1A202C; margin-bottom: 4px; }
    .use-sheet-addr { font-size: 13px; color: #718096; margin-bottom: 16px; line-height: 1.4; }
    .use-sheet-btns { display: flex; flex-direction: column; gap: 8px; }
    .use-sheet-btns button {
      width: 100%; padding: 13px; border-radius: 10px; font-size: 15px;
      font-weight: 600; cursor: pointer; border: none; text-align: left; padding-left: 16px;
    }
    .btn-use-origin { background: #EBF4FF; color: #1565C0; }
    .btn-use-dest   { background: #F0FFF4; color: #276749; }
    .btn-use-del    { background: #FFF5F5; color: #C53030; }
    .btn-use-cancel { background: #F7FAFC; color: #718096; }
  </style>
</head>
<body>

<!-- ─── Form ─── -->
<div id="view-form">
  <div class="header">
    <h1>🗺️ Rain Route</h1>
    <p>เช็คฝนตลอดเส้นทางก่อนออกเดินทาง</p>
  </div>

  <!-- Saved Places chips -->
  <div id="saved-section" class="saved-section" style="display:none">
    <div class="saved-label">📌 สถานที่บันทึก</div>
    <div class="saved-chips" id="saved-chips"></div>
  </div>

  <div class="card">
    <label>ต้นทาง</label>
    <div class="input-wrap">
      <span class="icon">📍</span>
      <input id="origin" type="text" placeholder="พิมพ์หรือเลือกจากแผนที่..." autocomplete="off" />
      <div class="ac-loading" id="loading-origin"></div>
      <button class="icon-btn" id="gps-origin"       onclick="detectGPS('origin')"      title="ตำแหน่งปัจจุบัน">🎯</button>
      <button class="icon-btn"                        onclick="openMapPicker('origin')"  title="เปิดแผนที่">🗺️</button>
      <button class="icon-btn"                        onclick="openSaveSheet('origin')"  title="บันทึกสถานที่">⭐</button>
      <div class="ac-dropdown" id="dropdown-origin"></div>
    </div>

    <label>ปลายทาง</label>
    <div class="input-wrap">
      <span class="icon">🏁</span>
      <input id="destination" type="text" placeholder="พิมพ์หรือเลือกจากแผนที่..." autocomplete="off" />
      <div class="ac-loading" id="loading-destination"></div>
      <button class="icon-btn" id="gps-destination"  onclick="detectGPS('destination')"      title="ตำแหน่งปัจจุบัน">🎯</button>
      <button class="icon-btn"                        onclick="openMapPicker('destination')"  title="เปิดแผนที่">🗺️</button>
      <button class="icon-btn"                        onclick="openSaveSheet('destination')"  title="บันทึกสถานที่">⭐</button>
      <div class="ac-dropdown" id="dropdown-destination"></div>
    </div>

    <label>เวลาออกเดินทาง</label>
    <div class="time-grid">
      <button class="time-btn active" data-val="now"    onclick="selectTime(this)">⚡ ตอนนี้</button>
      <button class="time-btn"        data-val="+30"   onclick="selectTime(this)">+30 นาที</button>
      <button class="time-btn"        data-val="+60"   onclick="selectTime(this)">+1 ชั่วโมง</button>
      <button class="time-btn"        data-val="custom" onclick="selectTime(this)">🕐 กำหนดเอง</button>
    </div>
    <div class="custom-time-wrap" id="custom-time-wrap">
      <input type="time" id="custom-time" />
    </div>

    <button class="btn-analyze" onclick="analyze()">🔍 วิเคราะห์เส้นทาง</button>
  </div>

  <div id="loading"><div class="spinner"></div><p>กำลังวิเคราะห์เส้นทาง...</p></div>
  <div id="error-box"></div>
</div>

<!-- ─── Map Modal ─── -->
<div id="map-modal">
  <div class="map-topbar">
    <button class="map-close-btn" onclick="closeMapModal()">✕ ปิด</button>
    <div class="map-topbar-title">เลือกตำแหน่ง</div>
    <button class="map-ok-btn" id="map-ok-btn" onclick="confirmMapLocation()" disabled>เลือก ✓</button>
  </div>

  <!-- Google PlaceAutocompleteElement goes here -->
  <div class="map-search-area" id="map-search-area"></div>

  <div id="gmap"></div>

  <div class="map-footer">
    <div id="map-addr-preview">📍 แตะบนแผนที่เพื่อเลือกตำแหน่ง</div>
    <button class="map-my-loc-btn" onclick="centerMapToMyLocation()">🎯 ตำแหน่งของฉัน</button>
  </div>
</div>

<!-- ─── Result ─── -->
<div id="result">
  <div id="res-header" class="result-header safe" style="margin:0;border-radius:0;padding:24px 20px 32px;">
    <div class="big-emoji" id="res-emoji">☀️</div>
    <h2 id="res-headline"></h2>
    <div class="meta" id="res-meta"></div>
    <div class="risk-bar-wrap">
      <div class="risk-label">โอกาสเจอฝนตลอดเส้นทาง <span id="res-risk">0</span>%</div>
      <div class="risk-bar"><div class="risk-fill" id="risk-fill" style="width:0%"></div></div>
    </div>
  </div>
  <div style="padding:0 16px;">
    <div class="rec-card" id="rec-card">
      <div class="rec-title">💡 คำแนะนำ</div>
      <div class="rec-text" id="rec-text"></div>
    </div>
    <div class="alt-depart" id="alt-depart" style="display:none">
      <span style="font-size:20px">⏰</span>
      <div>
        <div class="alt-text">แนะนำออกเดินทางเวลา</div>
        <div class="alt-time" id="alt-time"></div>
      </div>
    </div>
    <p class="section-title">สภาพอากาศตลอดเส้นทาง</p>
    <ul class="timeline" id="timeline"></ul>
    <button class="btn-send" onclick="sendToChat()"><span>💬</span> ส่งผลลัพธ์ไปที่แชต LINE</button>
    <button class="btn-back" onclick="showForm()">← วิเคราะห์เส้นทางใหม่</button>
  </div>
</div>

<script>
const LIFF_ID = '__LIFF_ID__';

let selectedTime     = 'now';
let lastResult       = null;
let mapInstance      = null;
let mapMarker        = null;
let mapTargetField   = '';
let mapSelectedAddr  = '';
let mapInitialised   = false;

// ── LIFF + auto GPS + push location ─────────────
let _lineUid = null;

(async () => {
  try {
    await liff.init({ liffId: LIFF_ID });
    try { _lineUid = liff.getDecodedIDToken()?.sub || null; } catch {}
  } catch (e) { console.warn('LIFF:', e.message); }
  detectGPS('origin', true, true);   // silent=true, pushLocation=true
})();

// อัพเดท location ขึ้น server (fire-and-forget)
async function pushLocationToServer(lat, lon, label) {
  if (!_lineUid) return;
  try {
    await fetch('/api/update-location', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ uid: _lineUid, lat, lon, label }),
    });
  } catch (e) { console.warn('pushLocation:', e); }
}

// ── GPS ──────────────────────────────────────────
async function detectGPS(field, silent = false, pushLocation = false) {
  if (!navigator.geolocation) { if (!silent) showError('GPS ไม่รองรับ'); return; }
  const btn   = document.getElementById(`gps-${field}`);
  const input = document.getElementById(field);
  btn.classList.add('locating');
  input.placeholder = 'กำลังระบุตำแหน่ง...';
  navigator.geolocation.getCurrentPosition(
    async ({ coords: { latitude: lat, longitude: lon } }) => {
      try {
        const res  = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=th`
        );
        const data = await res.json();
        const addr = data.display_name || `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
        input.value = addr;
        // อัพเดท location ใน DB ทุกครั้งที่เปิดแอป
        if (pushLocation) {
          const short = data.address
            ? (data.address.suburb || data.address.city_district || data.address.city || addr)
            : addr;
          pushLocationToServer(lat, lon, short);
        }
      } catch { if (!silent) showError('แปลงพิกัดไม่ได้'); }
      finally { btn.classList.remove('locating'); input.placeholder = 'พิมพ์หรือเลือกจากแผนที่...'; }
    },
    (err) => {
      btn.classList.remove('locating'); input.placeholder = 'พิมพ์หรือเลือกจากแผนที่...';
      if (!silent) showError(err.code === 1 ? 'กรุณาอนุญาต GPS ในการตั้งค่าเบราว์เซอร์' : 'ระบุตำแหน่งไม่ได้');
    },
    { timeout: 10000, enableHighAccuracy: true }
  );
}

// ── Text-input autocomplete (backend proxy) ───────
function setupAutocomplete(inputId, dropdownId, loadingId) {
  const input    = document.getElementById(inputId);
  const dropdown = document.getElementById(dropdownId);
  const loadEl   = document.getElementById(loadingId);
  let timer = null, active = -1;

  input.addEventListener('input', () => {
    clearTimeout(timer); active = -1;
    const q = input.value.trim();
    if (q.length < 2) { hide(); return; }
    loadEl.style.display = 'block';
    timer = setTimeout(() => fetchSug(q), 350);
  });
  input.addEventListener('keydown', (e) => {
    const items = dropdown.querySelectorAll('.ac-item');
    if (!items.length) return;
    if (e.key==='ArrowDown')  { active=Math.min(active+1,items.length-1); hl(items); e.preventDefault(); }
    else if(e.key==='ArrowUp'){ active=Math.max(active-1,-1); hl(items); e.preventDefault(); }
    else if(e.key==='Enter'&&active>=0){ items[active].dispatchEvent(new Event('mousedown')); e.preventDefault(); }
    else if(e.key==='Escape') hide();
  });
  document.addEventListener('mousedown', (e) => {
    if (!input.contains(e.target) && !dropdown.contains(e.target)) hide();
  });

  async function fetchSug(q) {
    try {
      const res  = await fetch(`/api/places-autocomplete?q=${encodeURIComponent(q)}`);
      const raw  = await res.json();
      loadEl.style.display = 'none';
      if (raw.length) { show(raw); return; }
      // fallback → Nominatim ถ้า Google ไม่มีผล
      const res2 = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&countrycodes=th&format=json&limit=5&accept-language=th`);
      const raw2 = await res2.json();
      show(raw2.map(d => ({ description: d.display_name })));
    } catch { loadEl.style.display='none'; hide(); }
  }
  function show(items) {
    if (!items?.length) { hide(); return; }
    dropdown.innerHTML = '';
    items.forEach(item => {
      const p = item.description.split(',');
      const d = document.createElement('div');
      d.className = 'ac-item';
      d.innerHTML = `<span class="ac-item-icon">📍</span><div>
        <div class="ac-item-main">${p[0]}</div>
        ${p.slice(1).join(',').trim() ? `<div class="ac-item-sub">${p.slice(1).join(',').trim()}</div>` : ''}
      </div>`;
      d.addEventListener('mousedown', (e) => { e.preventDefault(); input.value=item.description; hide(); });
      dropdown.appendChild(d);
    });
    dropdown.style.display = 'block'; active = -1;
  }
  function hl(items) {
    items.forEach((el,i) => el.style.background = i===active?'#EBF4FF':'');
    if (active>=0) items[active].scrollIntoView({block:'nearest'});
  }
  function hide() { dropdown.style.display='none'; dropdown.innerHTML=''; loadEl.style.display='none'; active=-1; }
}

setupAutocomplete('origin',      'dropdown-origin',      'loading-origin');
setupAutocomplete('destination', 'dropdown-destination', 'loading-destination');

// ── Map Modal ─────────────────────────────────────
async function openMapPicker(field) {
  mapTargetField  = field;
  mapSelectedAddr = '';
  document.getElementById('map-addr-preview').textContent = '📍 แตะบนแผนที่เพื่อเลือกตำแหน่ง';
  document.getElementById('map-ok-btn').disabled = true;
  document.getElementById('map-modal').style.display = 'flex';

  if (!mapInitialised) {
    try {
      initMap();
      // Leaflet ต้อง invalidateSize หลัง modal แสดง
      setTimeout(() => mapInstance?.invalidateSize(), 100);
    } catch (e) { closeMapModal(); showError('โหลดแผนที่ไม่ได้: ' + e.message); }
  } else {
    setTimeout(() => mapInstance?.invalidateSize(), 100);
  }
}

function initMap() {
  // Center on Bangkok as default
  const defaultCenter = [13.7563, 100.5018];

  mapInstance = L.map('gmap', { zoomControl: true }).setView(defaultCenter, 15);

  // OpenStreetMap tiles — ฟรี ไม่มีลายน้ำ
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(mapInstance);

  // ── Nominatim search ──
  const mapSearchInput = document.createElement('input');
  mapSearchInput.type = 'text';
  mapSearchInput.placeholder = '🔍 ค้นหาสถานที่ในไทย...';
  mapSearchInput.className = 'map-search-input';

  const mapSuggestBox = document.createElement('div');
  mapSuggestBox.className = 'map-suggest-box';

  const searchArea = document.getElementById('map-search-area');
  searchArea.appendChild(mapSearchInput);
  searchArea.appendChild(mapSuggestBox);

  let nomTimer;
  mapSearchInput.addEventListener('input', () => {
    clearTimeout(nomTimer);
    const q = mapSearchInput.value.trim();
    if (q.length < 2) { mapSuggestBox.style.display = 'none'; return; }
    nomTimer = setTimeout(async () => {
      try {
        // Google Places ก่อน → fallback Nominatim
        let items = [];
        const gr = await fetch(`/api/places-autocomplete?q=${encodeURIComponent(q)}`);
        const gd = await gr.json();
        if (gd.length) {
          // Google → geocode แต่ละ place_id เพื่อเอา lat/lon
          items = gd.map(p => ({ display_name: p.description, place_id: p.place_id }));
        } else {
          const nr = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&countrycodes=th&format=json&limit=5&accept-language=th`);
          const nd = await nr.json();
          items = nd.map(p => ({ display_name: p.display_name, lat: p.lat, lon: p.lon }));
        }
        if (!items.length) { mapSuggestBox.style.display = 'none'; return; }
        mapSuggestBox.innerHTML = '';
        items.forEach(item => {
          const div = document.createElement('div');
          div.className = 'map-suggest-item';
          div.textContent = '📍 ' + item.display_name;
          div.addEventListener('click', async () => {
            mapSuggestBox.style.display = 'none';
            mapSearchInput.value = '';
            let lat, lng;
            if (item.place_id) {
              const geo = await fetch(`/api/geocode?place_id=${item.place_id}`).then(r=>r.json());
              lat = geo.lat; lng = geo.lon;
            } else {
              lat = parseFloat(item.lat); lng = parseFloat(item.lon);
            }
            mapInstance.setView([lat, lng], 16);
            dropPin([lat, lng]);
            mapSelectedAddr = item.display_name;
            document.getElementById('map-addr-preview').textContent = '📍 ' + item.display_name;
            document.getElementById('map-ok-btn').disabled = false;
          });
          mapSuggestBox.appendChild(div);
        });
        mapSuggestBox.style.display = 'block';
      } catch { mapSuggestBox.style.display = 'none'; }
    }, 400);
  });
  document.addEventListener('click', (e) => {
    if (!searchArea.contains(e.target)) mapSuggestBox.style.display = 'none';
  });

  // ── Tap map → Nominatim reverse geocode ──
  mapInstance.on('click', async (e) => {
    const { lat, lng } = e.latlng;
    dropPin([lat, lng]);
    document.getElementById('map-addr-preview').textContent = '⏳ กำลังหาที่อยู่...';
    document.getElementById('map-ok-btn').disabled = true;
    try {
      const res  = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=th`
      );
      const data = await res.json();
      mapSelectedAddr = data.display_name || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      document.getElementById('map-addr-preview').textContent = '📍 ' + mapSelectedAddr;
      document.getElementById('map-ok-btn').disabled = false;
    } catch {
      document.getElementById('map-addr-preview').textContent = '❌ ระบุที่อยู่ไม่ได้';
    }
  });

  // ── Center to GPS on open ──
  navigator.geolocation?.getCurrentPosition(
    ({ coords: c }) => mapInstance.setView([c.latitude, c.longitude], 15),
    () => {}, { timeout: 5000 }
  );

  mapInitialised = true;
}

function dropPin(latlng) {
  if (mapMarker) mapMarker.remove();
  mapMarker = L.marker(latlng).addTo(mapInstance);
}

function centerMapToMyLocation() {
  navigator.geolocation?.getCurrentPosition(
    ({ coords: c }) => mapInstance?.setView([c.latitude, c.longitude], 16),
    () => alert('ไม่สามารถระบุตำแหน่งได้')
  );
}

function confirmMapLocation() {
  if (mapSelectedAddr && mapTargetField) {
    document.getElementById(mapTargetField).value = mapSelectedAddr;
  }
  closeMapModal();
}

function closeMapModal() {
  document.getElementById('map-modal').style.display = 'none';
}

// ── Time Selector ─────────────────────────────────
function selectTime(btn) {
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); selectedTime = btn.dataset.val;
  const wrap = document.getElementById('custom-time-wrap');
  if (selectedTime === 'custom') {
    wrap.classList.add('show');
    const n = new Date();
    document.getElementById('custom-time').value =
      `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  } else { wrap.classList.remove('show'); }
}

function getDepartureISO() {
  const now = new Date();
  if (selectedTime==='now')    return now.toISOString();
  if (selectedTime==='+30')    return new Date(now.getTime()+30*60000).toISOString();
  if (selectedTime==='+60')    return new Date(now.getTime()+60*60000).toISOString();
  if (selectedTime==='custom') {
    const [h,m] = document.getElementById('custom-time').value.split(':').map(Number);
    const t = new Date(now); t.setHours(h,m,0,0);
    if (t<now) t.setDate(t.getDate()+1);
    return t.toISOString();
  }
  return now.toISOString();
}

// ── Analyze ───────────────────────────────────────
async function analyze() {
  const origin = document.getElementById('origin').value.trim();
  const dest   = document.getElementById('destination').value.trim();
  if (!origin||!dest) { showError('กรุณาใส่ต้นทางและปลายทางก่อน'); return; }
  hideError(); showLoading(true);
  try {
    let uid = null;
    try { uid = liff.isLoggedIn() ? liff.getDecodedIDToken()?.sub : null; } catch {}
    const res = await fetch('/api/route-weather', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ origin, destination:dest, departure_iso:getDepartureISO(), uid }),
    });
    if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.detail||`Error ${res.status}`); }
    lastResult = await res.json();
    showResult(lastResult);
  } catch (e) { showError(e.message||'เกิดข้อผิดพลาด'); }
  finally { showLoading(false); }
}

// ── Render Result ─────────────────────────────────
function showResult(d) {
  document.getElementById('view-form').style.display = 'none';
  document.getElementById('result').style.display = 'block';

  const hdr = document.getElementById('res-header');
  hdr.className = 'result-header ' + (
    d.risk_pct===0 ? 'safe' : d.max_intensity==='light' ? 'light' :
    d.max_intensity==='moderate' ? 'moderate' : 'heavy'
  );
  document.getElementById('res-emoji').textContent    = d.max_emoji;
  document.getElementById('res-headline').textContent = headlineText(d);
  document.getElementById('res-meta').textContent =
    `${d.origin} → ${d.destination}  ·  ออก ${d.departure_str}  ·  ${d.duration_min} นาที`;
  document.getElementById('res-risk').textContent   = d.risk_pct;
  document.getElementById('risk-fill').style.width  = d.risk_pct + '%';

  const rc = document.getElementById('rec-card');
  rc.className = 'rec-card ' + (d.risk_pct>=75?'danger':d.risk_pct>=40?'warning':'');
  document.getElementById('rec-text').textContent = d.recommendation;

  const alt = document.getElementById('alt-depart');
  if (d.best_alt_departure) {
    alt.style.display='flex';
    document.getElementById('alt-time').textContent = d.best_alt_departure;
  } else alt.style.display='none';

  const tl = document.getElementById('timeline'); tl.innerHTML='';
  d.waypoints.forEach(wp => {
    const li = document.createElement('li');
    li.innerHTML=`<div class="tl-time">${wp.eta_str}</div>
      <div class="tl-dot ${wp.intensity}">${wp.emoji}</div>
      <div class="tl-info">
        <div class="tl-name">${wp.name}</div>
        <div class="tl-desc">${wp.intensity_th}</div>
      </div>`;
    tl.appendChild(li);
  });
}

function headlineText(d) {
  if (d.risk_pct===0)               return 'ฟ้าใส ออกได้เลย ☀️';
  if (d.risk_pct<30)                return 'มีฝนเล็กน้อยบางช่วง';
  if (d.max_intensity==='light')    return 'ฝนเล็กน้อยบางจุด';
  if (d.max_intensity==='moderate') return 'ฝนปานกลาง ระวังด้วยนะ';
  return 'ฝนหนัก ควรเลื่อนเวลา';
}

// ── Send to LINE ──────────────────────────────────
async function sendToChat() {
  if (!lastResult) return;
  const d = lastResult;
  const rain = d.rain_waypoints.length > 0
    ? d.rain_waypoints.map(w => `• ${w.name}  ${w.emoji}  ${w.eta_str}`).join('\n')
    : '• ไม่พบฝนตลอดเส้นทาง ✅';
  const msg = [
    `🗺️ Rain Route — ${d.origin} → ${d.destination}`,
    `⏰ ออก ${d.departure_str}  |  🚗 ${d.duration_min} นาที`,
    `☔ ความเสี่ยงเจอฝน ${d.risk_pct}%`,
    '', '📍 จุดที่มีฝน:', rain, '',
    `💡 ${d.recommendation}`,
    d.best_alt_departure ? `⏰ แนะนำออก ${d.best_alt_departure} แทน` : '',
  ].filter(Boolean).join('\n').trim();

  const btn = document.querySelector('.btn-send');
  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> กำลังส่ง...';

  try {
    // 1. ลอง liff.sendMessages (ต้องเปิดจากใน LINE chat)
    if (typeof liff !== 'undefined' && liff.isInClient()) {
      try {
        await liff.sendMessages([{ type: 'text', text: msg }]);
        btn.innerHTML = '<span>✅</span> ส่งแล้ว!';
        setTimeout(() => liff.closeWindow(), 800);
        return;
      } catch (e) {
        console.warn('sendMessages failed:', e.message);
      }
    }
    // 2. ลอง clipboard API
    try {
      await navigator.clipboard.writeText(msg);
      showMsgBox(msg, 'คัดลอกแล้ว! วางใน LINE ได้เลย 📋');
      return;
    } catch { /* ตกมา fallback */ }
    // 3. แสดง textarea ให้ copy เอง
    showMsgBox(msg, 'คัดลอกข้อความนี้ไปวางใน LINE');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span>💬</span> ส่งผลลัพธ์ไปที่แชต LINE';
  }
}

function showMsgBox(msg, title) {
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99999;display:flex;align-items:flex-end;padding-bottom:env(safe-area-inset-bottom,0);';
  ov.innerHTML = `
    <div style="background:white;width:100%;border-radius:20px 20px 0 0;padding:20px 20px 24px;">
      <div style="font-size:15px;font-weight:600;margin-bottom:12px;color:#1A202C;">💬 ${title}</div>
      <textarea id="_msg_ta" readonly style="width:100%;height:160px;font-size:13px;line-height:1.6;
        padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:10px;resize:none;
        font-family:-apple-system,sans-serif;color:#1A202C;background:#F7FAFC;">${msg}</textarea>
      <button id="_copy_btn" onclick="
        var ta=document.getElementById('_msg_ta');
        ta.select(); ta.setSelectionRange(0,99999);
        try { navigator.clipboard.writeText(ta.value); } catch { document.execCommand('copy'); }
        this.textContent='✅ คัดลอกแล้ว!';
        setTimeout(()=>this.closest('div').parentElement.remove(),800);
      " style="width:100%;margin-top:12px;padding:14px;background:#1565C0;color:white;
        border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;">
        📋 คัดลอก
      </button>
    </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
  setTimeout(() => document.getElementById('_msg_ta')?.select(), 150);
}

function showForm()   { document.getElementById('view-form').style.display='block'; document.getElementById('result').style.display='none'; hideError(); }

// ── Saved Places ──────────────────────────────────
const STORAGE_KEY = 'rainroute_saved_v1';

function loadSaved() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveSaved(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

function renderSavedChips() {
  const places = loadSaved();
  const section = document.getElementById('saved-section');
  const chips   = document.getElementById('saved-chips');
  if (!places.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  chips.innerHTML = '';
  places.forEach(p => {
    const chip = document.createElement('button');
    chip.className = 'saved-chip';
    chip.innerHTML = `📌 ${p.name}`;
    chip.onclick = () => openUseSheet(p);
    chips.appendChild(chip);
  });
}

// ── Save Sheet (บันทึกสถานที่) ─────────────────────
function openSaveSheet(field) {
  const addr = document.getElementById(field).value.trim();
  if (!addr) { showError('กรอกที่อยู่ก่อนแล้วค่อยบันทึก'); return; }

  // ตรวจว่ามีบันทึกอยู่แล้วไหม
  const places   = loadSaved();
  const existing = places.find(p => p.address === addr);

  const sheet = document.createElement('div');
  sheet.className = 'save-sheet';
  sheet.innerHTML = `
    <div class="save-sheet-inner">
      <div class="save-sheet-title">${existing ? '✏️ แก้ไขสถานที่' : '⭐ บันทึกสถานที่'}</div>
      <div class="save-sheet-addr">${addr.slice(0, 80)}${addr.length > 80 ? '…' : ''}</div>
      <input class="save-sheet-input" id="_save_name" maxlength="20"
        placeholder="ตั้งชื่อ เช่น บ้าน, ออฟฟิศ, ห้าง..."
        value="${existing ? existing.name : ''}"/>
      <div class="save-sheet-actions">
        ${existing ? `<button class="btn-save-del" onclick="_doDelete('${existing.id}',this.closest('.save-sheet'))">🗑️ ลบ</button>` : ''}
        <button class="btn-save-cancel" onclick="this.closest('.save-sheet').remove()">ยกเลิก</button>
        <button class="btn-save-ok" onclick="_doSave('${addr.replace(/'/g,"\\'")}',this.closest('.save-sheet'),'${existing ? existing.id : ''}')">บันทึก ✓</button>
      </div>
    </div>`;
  document.body.appendChild(sheet);
  sheet.addEventListener('click', e => { if (e.target === sheet) sheet.remove(); });
  setTimeout(() => document.getElementById('_save_name')?.focus(), 100);
}

function _doSave(addr, sheet, existingId) {
  const name = document.getElementById('_save_name')?.value.trim();
  if (!name) { document.getElementById('_save_name').style.borderColor='#FC8181'; return; }
  let places = loadSaved();
  if (existingId) {
    places = places.map(p => p.id === existingId ? {...p, name, address: addr} : p);
  } else {
    places.push({ id: Date.now().toString(), name, address: addr });
  }
  saveSaved(places);
  sheet.remove();
  renderSavedChips();
}

function _doDelete(id, sheet) {
  saveSaved(loadSaved().filter(p => p.id !== id));
  sheet.remove();
  renderSavedChips();
}

// ── Use Sheet (เลือกใช้เป็นต้นทาง/ปลายทาง) ──────

        <button class="btn-use-dest"   onclick="_fillField('destination','${place.address.replace(/'/g,"\\'")}',this.closest('.use-sheet'))">🏁 ใช้เป็นปลายทาง</button>
        <button class="btn-use-del"    onclick="_doDelete('${place.id}',this.closest('.use-sheet'))">🗑️ ลบสถานที่นี้</button>
        <button class="btn-use-cancel" onclick="this.closest('.use-sheet').remove()">ยกเลิก</button>

  sheet.addEventListener('click', e => { if (e.target === sheet) sheet.remove(); });
}

function _fillField(field, addr, sheet) {
  document.getElementById(field).value = addr;
  sheet.remove();
}

// โหลด chips เมื่อเปิดหน้า
renderSavedChips();
</script>
